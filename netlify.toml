[build]
 command = "bundle exec jekyll build"
 publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "3.1.4"

# Consolidate legacy writing indexes at the canonical Writing page.
[[redirects]]
  from = "/blogs/*"
  to = "/writing/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/writing/"
  status = 301
  force = true

[[redirects]]
  from = "/posts/*"
  to = "/writing/"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
